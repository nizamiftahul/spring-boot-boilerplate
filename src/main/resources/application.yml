spring:
  application:
    name: spring-boot-boilerplate
  
  profiles:
    active: dev
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: ${JWT_SECRET:mySecretKeyForLocalDevelopmentChangeInProduction}
  expiration-ms: 900000 # 15 minutes
  refresh-expiration-ms: 604800000 # 7 days
  max-concurrent-tokens: 5
  token-rotation-policy: ALWAYS_ROTATE # ALWAYS_ROTATE or NO_ROTATE
  cleanup-enabled: false # Disabled by default (enable in prod)

---
spring:
  config:
    activate:
      on-profile: dev
  
  jpa:
    show-sql: true

logging:
  level:
    root: INFO
    com.example.spring_boot_boilerplate: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  
  datasource:
    url: jdbc:h2:file:./data/proddb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000
  max-concurrent-tokens: ${JWT_MAX_CONCURRENT_TOKENS:5}
  token-rotation-policy: ${JWT_TOKEN_ROTATION_POLICY:ALWAYS_ROTATE}
  cleanup-enabled: true # Enable cleanup in production

logging:
  level:
    root: WARN
    com.example.spring_boot_boilerplate: INFO
